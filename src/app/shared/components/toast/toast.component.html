@if (toastService.currentToast(); as toast) {
  <div class="fixed bottom-4 right-4 z-50 animate-fade-in-up">
    <div
      class="flex items-center gap-3 px-6 py-4 rounded-lg shadow-lg text-white font-medium"
      [class.bg-emerald-500]="toast.type === 'success'"
      [class.bg-rose-500]="toast.type === 'error'"
    >
      @if (toast.type === "success") {
        <span>✅</span>
      } @else {
        <span>⚠️</span>
      }

      <span>{{ toast.message }}</span>
    </div>
  </div>
}
