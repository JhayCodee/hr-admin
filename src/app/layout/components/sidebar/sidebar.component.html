<aside
  class="w-64 h-full bg-slate-900 text-white flex flex-col transition-all duration-300"
>
  <div class="h-16 flex items-center justify-center border-b border-slate-800">
    <span class="text-xl font-bold tracking-wider">HR ADMIN</span>
  </div>

  <nav class="flex-1 overflow-y-auto py-4">
    <ul class="space-y-1 px-2">
      <li>
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-slate-800 text-blue-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors cursor-pointer"
        >
          <span>🏠</span>
          <span class="font-medium">Dashboard</span>
        </a>
      </li>

      <li>
        <a
          routerLink="/empleados"
          routerLinkActive="bg-slate-800 text-blue-400"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-colors cursor-pointer"
        >
          <span>👥</span>
          <span class="font-medium">Empleados</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="p-4 border-t border-slate-800">
    <div class="flex items-center gap-3">
      <div
        class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center"
      >
        U
      </div>
      <div class="text-sm">
        <p class="font-medium">Usuario</p>
        <p class="text-xs text-slate-400">Admin</p>
      </div>
    </div>
  </div>
</aside>
