<header
  class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6"
>
  <h2 class="text-lg font-semibold text-gray-800">Panel de Control</h2>

  <div class="flex items-center gap-4">
    <div class="relative">
      <button
        (click)="toggleNotifications()"
        class="p-2 text-gray-500 hover:text-blue-600 transition-colors relative focus:outline-none rounded-full hover:bg-slate-100"
      >
        🔔
        @if (hasUnread()) {
          <span
            class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"
          ></span>
        }
      </button>

      @if (isNotificationsOpen()) {
        <div
          class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-lg border border-gray-100 z-50 overflow-hidden origin-top-right"
        >
          <div
            class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"
          >
            <h3 class="font-bold text-gray-800 text-sm">Notificaciones</h3>
            <button
              (click)="markAllAsRead()"
              class="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors"
            >
              Marcar leídas
            </button>
          </div>

          <div class="max-h-80 overflow-y-auto">
            @for (note of notifications(); track note.id) {
              <div
                class="p-4 border-b border-gray-50 hover:bg-slate-50 transition-colors cursor-pointer"
                [class.bg-blue-50]="note.unread"
              >
                <p class="text-sm font-semibold text-gray-800">
                  {{ note.title }}
                </p>
                <p class="text-xs text-gray-600 mt-1">{{ note.message }}</p>
                <p class="text-xs text-gray-400 mt-2">{{ note.time }}</p>
              </div>
            } @empty {
              <div class="p-6 text-center text-gray-500 text-sm">
                No tienes notificaciones nuevas.
              </div>
            }
          </div>
        </div>
      }
    </div>
    <button
      (click)="onLogout()"
      class="text-sm font-medium text-red-600 hover:text-red-700 transition-colors px-3 py-2 rounded-md hover:bg-red-50"
    >
      Cerrar Sesión
    </button>
  </div>
</header>
