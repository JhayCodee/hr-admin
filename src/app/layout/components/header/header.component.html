<header
  class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6"
>
  <h2 class="text-lg font-semibold text-gray-800">Panel de Control</h2>

  <div class="flex items-center gap-4">
    <button class="p-2 text-gray-500 hover:text-blue-600 transition-colors">
      🔔
    </button>
    <button
      (click)="onLogout()"
      class="text-sm font-medium text-red-600 hover:text-red-700 transition-colors px-3 py-2 rounded-md hover:bg-red-50"
    >
      Cerrar Sesión
    </button>
  </div>
</header>
