<div class="bg-white rounded-2xl shadow-xl p-8">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-slate-800">Bienvenido a HR Admin</h1>
    <p class="text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
  </div>

  <form class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"
        >Correo Electrónico</label
      >
      <input
        type="email"
        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
        placeholder="admin@empresa.com"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"
        >Contraseña</label
      >
      <input
        type="password"
        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
        placeholder="••••••••"
      />
    </div>

    <button
      type="button"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors"
    >
      Iniciar Sesión
    </button>
  </form>
</div>
