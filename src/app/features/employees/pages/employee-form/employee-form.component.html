<div
  class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8 mt-6"
>
  <div class="mb-8 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-800">
      {{ isEditMode() ? "Editar Empleado" : "Nuevo Empleado" }}
    </h1>
    <a
      routerLink="/empleados"
      class="text-gray-500 hover:text-gray-700 transition-colors"
    >
      ← Volver al listado
    </a>
  </div>

  <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"
        >Nombre Completo</label
      >
      <input
        type="text"
        formControlName="name"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 transition-all"
        [class.border-red-500]="controls.name.invalid && controls.name.touched"
        placeholder="Ej: Luis Carlos"
      />
      @if (controls.name.invalid && controls.name.touched) {
        <span class="text-red-500 text-sm mt-1 block"
          >El nombre es obligatorio y debe tener 3 caracteres.</span
        >
      }
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2"
          >Cargo</label
        >
        <input
          type="text"
          formControlName="position"
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 transition-all"
          [class.border-red-500]="
            controls.position.invalid && controls.position.touched
          "
          placeholder="Ej: Frontend Dev"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2"
          >Departamento</label
        >
        <select
          formControlName="department"
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 transition-all bg-white"
          [class.border-red-500]="
            controls.department.invalid && controls.department.touched
          "
        >
          <option value="" disabled>Selecciona uno...</option>
          <option value="IT">Tecnología (IT)</option>
          <option value="RRHH">Recursos Humanos</option>
          <option value="Ventas">Ventas</option>
          <option value="Diseño">Diseño</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"
        >Estado del Empleado</label
      >
      <div class="flex gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="radio"
            formControlName="status"
            value="active"
            class="w-4 h-4 text-blue-600"
          />
          <span>Activo</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="radio"
            formControlName="status"
            value="inactive"
            class="w-4 h-4 text-blue-600"
          />
          <span>Inactivo</span>
        </label>
      </div>
    </div>

    <div class="pt-4 border-t border-gray-100 flex justify-end gap-3">
      <button
        type="button"
        routerLink="/empleados"
        class="px-6 py-3 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium transition-colors"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors flex items-center justify-center min-w-[160px] disabled:opacity-70 disabled:cursor-not-allowed"
      >
        @if (isSubmitting()) {
          <svg
            class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          Guardando...
        } @else {
          {{ isEditMode() ? "Guardar Cambios" : "Crear Empleado" }}
        }
      </button>
    </div>
  </form>
</div>
